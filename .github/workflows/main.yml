name: Docker Publish

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Build projet
      - name: Build with Maven
        run: mvn -B clean package --file Examen_certifiant/pom.xml -DskipTests

      # Analyse qualité du code
      - name: SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify sonar:sonar \
          -Dsonar.projectKey=youessah_Examen_certifiant \
          -Dsonar.organization=youessah \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=$SONAR_TOKEN \
          --file Examen_certifiant/pom.xml

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Debug Secrets
        run: |
          echo "DOCKER_NAME length: ${#NAME}"
          echo "DOCKER_TOKEN1 length: ${#TOKEN}"
        env:
          NAME: ${{ secrets.DOCKER_NAME }}
          TOKEN: ${{ secrets.DOCKER_TOKEN1 }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_NAME }}
          password: ${{ secrets.DOCKER_TOKEN1 }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: Examen_certifiant
          push: true
          tags: |
            ${{ secrets.DOCKER_NAME }}/ecomove:latest
            ${{ secrets.DOCKER_NAME }}/ecomove:${{ github.sha }}
