# ============================================================
# EcoMove Platform - Configuration TEST (Tests Unitaires)
# Auteur: MBONGO BOLLO Jarle
# ============================================================

# ---- Base de données H2 en mémoire ----
spring.datasource.url=jdbc:h2:mem:ecomove_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ---- JWT ----
app.jwt.secret=EcoMoveTestSecretKeyForUnitTests2026VeryLongKeyForHMACSHA256Algorithm
app.jwt.expiration-ms=3600000

# ---- Swagger desactive ----
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ---- Logging minimal ----
logging.level.root=WARN
logging.level.com.ecomove.ecoMove=DEBUG
