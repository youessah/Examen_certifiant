# ============================================================
# EcoMove Platform - Configuration DEV (Développement)

# ============================================================

# ---- Base de données MySQL (Développement) ----
spring.datasource.url=jdbc:mysql://localhost:3306/ecomove_dev?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- Serveur ----
server.port=8085

# ---- JWT Configuration ----
app.jwt.secret=EcoMoveSecretKeyForDevelopment2026VeryLongKeyForHMACSHA256Algorithm
app.jwt.expiration-ms=86400000

# ---- Swagger / OpenAPI ----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ---- Logging ----
logging.level.root=INFO
logging.level.com.ecomove.ecoMove=DEBUG
logging.level.org.springframework.security=DEBUG
