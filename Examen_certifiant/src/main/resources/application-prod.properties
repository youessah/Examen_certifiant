# ============================================================
# EcoMove Platform - Configuration PROD (Production)
# ============================================================

# ---- Base de données MySQL (Production) ----
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ecomove_prod}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=false
spring.datasource.username=${DB_USERNAME:ecomove_admin}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- Pool de connexions HikariCP ----
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- Serveur ----
server.port=${SERVER_PORT:8080}

# ---- JWT Configuration ----
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# ---- Swagger / OpenAPI ----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ---- Actuator (Production - limité) ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ---- Logging ----
logging.level.root=WARN
logging.level.com.ecomove.ecoMove=INFO
logging.level.org.springframework.security=WARN
